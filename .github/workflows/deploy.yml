name: CI/CD Backend — Build, Push & Deploy

on:
  push:
    branches:
      - deploy

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_VENTAS: ${{ secrets.DOCKERHUB_USERNAME }}/backend-ventas
  IMAGE_DESPACHOS: ${{ secrets.DOCKERHUB_USERNAME }}/backend-despachos

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Build & push both images to Docker Hub
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend Ventas ──────────────────────────────────────
      - name: Build & push backend-ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_VENTAS }}:latest
            ${{ env.IMAGE_VENTAS }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend Despachos ───────────────────────────────────
      - name: Build & push backend-despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          file: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_DESPACHOS }}:latest
            ${{ env.IMAGE_DESPACHOS }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # 2. Deploy to EC2 — pull new images and restart containers
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose and init-db to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,init-db/"
          target: "/home/${{ secrets.EC2_USER }}/devops_backend"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/devops_backend

            # Write .env from GitHub Secrets
            cat > .env <<EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DB_NAME_VENTAS=${{ secrets.DB_NAME_VENTAS }}
            DB_NAME_DESPACHOS=${{ secrets.DB_NAME_DESPACHOS }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF

            # Pull latest images
            docker compose pull backend-ventas backend-despachos

            # Recreate only app containers (MySQL keeps its volume)
            docker compose up -d --no-deps --force-recreate backend-ventas backend-despachos

            # Clean up dangling images
            docker image prune -f
