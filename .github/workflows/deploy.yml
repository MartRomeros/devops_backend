name: CI/CD Backend - Build, Push & Deploy

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_VENTAS: ${{ secrets.DOCKERHUB_USERNAME }}/backend-ventas
  IMAGE_DESPACHOS: ${{ secrets.DOCKERHUB_USERNAME }}/backend-despachos

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend-ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_VENTAS }}:latest
            ${{ env.IMAGE_VENTAS }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend-despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          file: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_DESPACHOS }}:latest
            ${{ env.IMAGE_DESPACHOS }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy backend via public EC2 to private EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy backend stack through public EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PUBLIC_EC2_HOST }}
          username: ${{ secrets.PUBLIC_EC2_USER }}
          key: ${{ secrets.PUBLIC_EC2_SSH_KEY }}
          script: |
            set -eu

            mkdir -p "$HOME/.ssh"
            PRIVATE_KEY_PATH="$HOME/.ssh/private_ec2_key.pem"

            cleanup() {
              rm -f "$PRIVATE_KEY_PATH"
            }
            trap cleanup EXIT

            cat > "$PRIVATE_KEY_PATH" <<'PEM'
            ${{ secrets.PRIVATE_EC2_SSH_KEY }}
            PEM
            chmod 600 "$PRIVATE_KEY_PATH"

            ssh -i "$PRIVATE_KEY_PATH" -o StrictHostKeyChecking=accept-new "${{ secrets.PRIVATE_EC2_USER }}@${{ secrets.PRIVATE_EC2_BACKEND_HOST }}" "bash -se" <<'PRIVATE_EOF'
            set -euo pipefail

            if command -v sudo >/dev/null 2>&1; then
              SUDO_BIN="sudo"
            else
              SUDO_BIN=""
            fi

            sudo_run() {
              if [ -n "$SUDO_BIN" ]; then
                sudo "$@"
              else
                "$@"
              fi
            }

            if ! command -v git >/dev/null 2>&1; then
              sudo_run apt-get update
              sudo_run apt-get install -y git
            fi

            if ! command -v docker >/dev/null 2>&1; then
              sudo_run apt-get update
              sudo_run apt-get install -y docker.io docker-compose-v2 || sudo_run apt-get install -y docker.io docker-compose-plugin
              sudo_run systemctl enable --now docker
            fi

            if ! docker compose version >/dev/null 2>&1; then
              sudo_run apt-get update
              sudo_run apt-get install -y docker-compose-v2 || sudo_run apt-get install -y docker-compose-plugin
            fi

            if command -v systemctl >/dev/null 2>&1; then
              if ! sudo_run systemctl is-active --quiet docker; then
                sudo_run systemctl enable --now docker
              fi
            fi

            if docker ps >/dev/null 2>&1; then
              DOCKER_PREFIX=()
            elif [ -n "$SUDO_BIN" ] && sudo docker ps >/dev/null 2>&1; then
              DOCKER_PREFIX=(sudo)
            else
              echo "Docker is installed but not usable by this user."
              exit 1
            fi

            APP_DIR="/home/${{ secrets.PRIVATE_EC2_USER }}/devops_backend"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "${{ secrets.REPO_URL }}" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            cat > .env <<EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF

            "${DOCKER_PREFIX[@]}" docker compose pull backend-ventas backend-despachos
            "${DOCKER_PREFIX[@]}" docker compose up -d postgres
            "${DOCKER_PREFIX[@]}" docker compose up -d --no-deps --force-recreate backend-ventas backend-despachos
            "${DOCKER_PREFIX[@]}" docker compose ps postgres backend-ventas backend-despachos

            "${DOCKER_PREFIX[@]}" docker image prune -f
            PRIVATE_EOF
